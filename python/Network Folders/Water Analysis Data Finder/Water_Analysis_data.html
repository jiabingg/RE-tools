.<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OEC File Scanner Browser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e13;--surface:#13161d;--surface2:#1a1e28;--surface3:#222735;
  --border:#2a2f3e;--border-hi:#3a4055;
  --text:#d8dce6;--text-dim:#7a8299;--text-bright:#f0f2f7;
  --accent:#4ea8de;--accent-dim:#2a6a9a;--accent-glow:rgba(78,168,222,.15);
  --green:#66d9a0;--green-dim:rgba(102,217,160,.12);
  --orange:#e8a855;--orange-dim:rgba(232,168,85,.12);
  --radius:8px;--radius-lg:12px;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.5}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hi)}

.app{max-width:1500px;margin:0 auto;padding:24px 28px}

/* ── Header ── */
header{display:flex;align-items:center;gap:16px;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
header .logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:700;font-size:1.15rem;color:var(--text-bright);white-space:nowrap}
header .logo .icon{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.meta-bar{display:flex;gap:20px;margin-left:auto;font-size:.8rem;color:var(--text-dim);font-family:var(--mono);flex-wrap:wrap}
.meta-bar span strong{color:var(--text)}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
#search{width:100%;padding:11px 14px 11px 42px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-bright);font-family:var(--sans);font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#search::placeholder{color:var(--text-dim)}
.search-info{font-size:.78rem;color:var(--text-dim);margin-top:5px;font-family:var(--mono);display:none}
.search-info.visible{display:block}
.search-info em{color:var(--accent);font-style:normal}

/* ── Status Filters ── */
.status-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.sfil{padding:5px 12px;border-radius:16px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.sfil:hover{border-color:var(--border-hi);color:var(--text)}
.sfil.active{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--accent)}

/* ── Layout: Sidebar + Main ── */
.content{display:flex;gap:16px;min-height:500px}

/* Sidebar */
.sidebar{width:300px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column}
.sidebar-hdr{padding:10px 14px;font-family:var(--mono);font-weight:600;font-size:.76rem;color:var(--text-dim);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.sidebar-hdr .all-btn{font-size:.68rem;padding:3px 10px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s;font-family:var(--mono)}
.sidebar-hdr .all-btn:hover{border-color:var(--border-hi);color:var(--text)}
.sidebar-hdr .all-btn.active{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--accent)}
.root-list{overflow-y:auto;flex:1}
.root-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.root-item:hover{background:var(--surface2)}
.root-item.active{background:var(--accent-glow);border-left:3px solid var(--accent)}
.root-label{font-family:var(--mono);font-size:.75rem;color:var(--text-bright);word-break:break-all;line-height:1.35}
.root-count{font-size:.68rem;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
.root-copy{display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:1px 6px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;font-size:.65rem;font-family:var(--mono);transition:all .15s;vertical-align:middle}
.root-copy:hover{border-color:var(--border-hi);color:var(--accent);background:var(--surface2)}
.root-copy.copied{color:var(--green);border-color:rgba(102,217,160,.3)}

/* Main Panel */
.main-panel{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column}
.table-header{
  display:grid;grid-template-columns:32px 1.4fr 2fr auto 1fr 44px;
  gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:.72rem;font-weight:600;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.5px;background:var(--surface);
}
.col-sort{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.col-sort:hover{color:var(--text)}
.col-sort.sorted{color:var(--accent)}
.table-body{flex:1;overflow-y:auto}
.row{
  display:grid;grid-template-columns:32px 1.4fr 2fr auto 1fr 44px;
  gap:8px;padding:8px 16px;align-items:center;
  border-bottom:1px solid rgba(42,47,62,.35);transition:background .12s;
}
.row:hover{background:var(--surface2)}
.row .ic{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--surface3);color:var(--text-dim)}
.row .fname{font-family:var(--mono);font-size:.8rem;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .fpath{font-family:var(--mono);font-size:.72rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{padding:2px 8px;border-radius:10px;font-size:.66rem;font-family:var(--mono);white-space:nowrap}
.badge.confirmed{background:var(--green-dim);color:var(--green)}
.badge.filename-only{background:var(--orange-dim);color:var(--orange)}
.row .kw{font-size:.7rem;color:var(--text-dim);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .copy-cell{display:flex;justify-content:center}
.cbtn{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.cbtn:hover{border-color:var(--border-hi);color:var(--accent);background:var(--surface2)}
.cbtn.copied{color:var(--green);border-color:rgba(102,217,160,.3);background:var(--green-dim)}

.result-count{font-family:var(--mono);font-size:.78rem;color:var(--text-dim);padding:10px 16px;border-top:1px solid var(--border)}
.result-count em{color:var(--accent);font-style:normal}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;text-align:center;color:var(--text-dim)}
.empty .big{font-size:48px;margin-bottom:14px;opacity:.4}
.empty p{font-size:.88rem;max-width:320px;line-height:1.6}

/* ── Drop Zone ── */
.drop-zone{display:flex;align-items:center;justify-content:center;min-height:420px}
.drop-zone-inner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 48px;border:2px dashed var(--border-hi);border-radius:var(--radius-lg);background:var(--surface);transition:border-color .25s,background .25s;max-width:480px;width:100%}
.drop-zone.dragover .drop-zone-inner{border-color:var(--accent);background:var(--accent-glow)}
.drop-icon{font-size:52px;margin-bottom:16px;opacity:.7}
.drop-title{font-family:var(--mono);font-weight:700;font-size:1.1rem;color:var(--text-bright);margin-bottom:8px}
.drop-desc{color:var(--text-dim);font-size:.88rem;margin-bottom:20px}
.drop-btn{padding:10px 28px;border-radius:var(--radius);background:var(--accent);border:none;color:#fff;font-family:var(--mono);font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s}
.drop-btn:hover{background:var(--accent-dim)}
.drop-error{margin-top:14px;color:#e86565;font-family:var(--mono);font-size:.8rem;min-height:1.2em}

.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius);background:var(--surface3);border:1px solid var(--green);color:var(--green);font-family:var(--mono);font-size:.8rem;transform:translateY(80px);opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toast.show{transform:translateY(0);opacity:1}
mark{background:rgba(78,168,222,.3);color:var(--text-bright);border-radius:2px;padding:0 1px}

@media(max-width:1100px){
  .table-header,.row{grid-template-columns:28px 1fr 1.2fr auto 44px}
  .kw-col,.row .kw{display:none}
}
@media(max-width:900px){
  .content{flex-direction:column}
  .sidebar{width:100%;max-height:220px}
}
@media(max-width:700px){
  .table-header,.row{grid-template-columns:28px 1fr auto 44px}
  .path-col,.row .fpath{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><div class="icon">&#128269;</div><span>OEC File Scanner</span></div>
    <div class="meta-bar" id="metaBar"></div>
  </header>

  <!-- Drop zone -->
  <div id="dropZone" class="drop-zone">
    <div class="drop-zone-inner">
      <div class="drop-icon">📂</div>
      <div class="drop-title">Load OEC_output.json</div>
      <p class="drop-desc">Drag & drop the JSON file here, or click to browse</p>
      <input type="file" id="fileInput" accept=".json" style="display:none">
      <button class="drop-btn" onclick="document.getElementById('fileInput').click()">Choose File</button>
      <div id="dropError" class="drop-error"></div>
    </div>
  </div>

  <!-- App body -->
  <div id="appBody" style="display:none">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search filenames, folders, keywords…" autocomplete="off">
      <div class="search-info" id="searchInfo"></div>
    </div>
    <div class="status-filters" id="statusFilters"></div>
    <div class="content">
      <aside class="sidebar">
        <div class="sidebar-hdr">
          <span>Root Folders</span>
          <button class="all-btn active" id="allBtn">Show All</button>
        </div>
        <div class="root-list" id="rootList"></div>
      </aside>
      <section class="main-panel">
        <div class="table-header">
          <div></div>
          <div class="col-sort" data-col="filename">Filename <span class="arrow"></span></div>
          <div class="col-sort path-col" data-col="folder">Folder <span class="arrow"></span></div>
          <div>Status</div>
          <div class="kw-col">Keywords</div>
          <div></div>
        </div>
        <div class="table-body" id="tableBody"></div>
        <div class="result-count" id="resultCount"></div>
      </section>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let DATA=null,allEntries=[],searchQuery='',activeRoot='all',statusFilter='all';
let sortCol='filename',sortDir=1;

// ── File Loading ──
(function(){
  const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput'),de=document.getElementById('dropError');
  fetch('OEC_output.json').then(r=>{if(!r.ok)throw 0;return r.json()}).then(j=>loadData(j)).catch(()=>{});
  ['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('dragover')}));
  ['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('dragover')}));
  dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)readFile(f)});
  fi.addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f)});
  function readFile(f){
    if(!f.name.endsWith('.json')){de.textContent='Please select a .json file';return}
    de.textContent='';const r=new FileReader();
    r.onload=()=>{try{const j=JSON.parse(r.result);if(!j.entries)throw new Error('Missing "entries"');loadData(j)}catch(e){de.textContent='Invalid: '+e.message}};
    r.readAsText(f);
  }
  function loadData(j){
    DATA=j;allEntries=DATA.entries||[];
    document.getElementById('dropZone').style.display='none';
    document.getElementById('appBody').style.display='block';
    buildApp();
  }
})();

function buildApp(){
  // Meta bar
  document.getElementById('metaBar').innerHTML=
    `<span>Files: <strong>${allEntries.length}</strong></span>
     <span>Scanned: <strong>${fmtDate(DATA.created)}</strong></span>
     <span>Updated: <strong>${fmtDate(DATA.last_updated)}</strong></span>`;

  // Status filters
  const conf=allEntries.filter(e=>e.match_status==='content_confirmed').length;
  document.getElementById('statusFilters').innerHTML=
    `<button class="sfil active" data-st="all">All</button>
     <button class="sfil" data-st="content_confirmed">Confirmed (${conf})</button>
     <button class="sfil" data-st="filename_match_only">Filename (${allEntries.length-conf})</button>`;
  document.querySelectorAll('.sfil').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.sfil').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');statusFilter=b.dataset.st;render();
  });

  // Sort headers
  document.querySelectorAll('.col-sort').forEach(h=>{
    h.onclick=()=>{const c=h.dataset.col;if(sortCol===c)sortDir*=-1;else{sortCol=c;sortDir=1}render()};
  });

  // Show All button
  document.getElementById('allBtn').onclick=()=>{activeRoot='all';render()};

  // Search
  document.getElementById('search').addEventListener('input',e=>{searchQuery=e.target.value.trim().toLowerCase();render()});

  render();
}

function getFiltered(){
  let list=allEntries;
  if(activeRoot!=='all')list=list.filter(e=>(e.root_folder||'(no root)')===activeRoot);
  if(statusFilter!=='all')list=list.filter(e=>e.match_status===statusFilter);
  if(searchQuery)list=list.filter(e=>
    e.filename.toLowerCase().includes(searchQuery)||
    e.folder.toLowerCase().includes(searchQuery)||
    e.filepath.toLowerCase().includes(searchQuery)||
    (e.content_keywords_found||[]).some(k=>k.toLowerCase().includes(searchQuery))
  );
  list.sort((a,b)=>{const va=(a[sortCol]||'').toLowerCase(),vb=(b[sortCol]||'').toLowerCase();return va<vb?-sortDir:va>vb?sortDir:0});
  return list;
}

function render(){
  const filtered=getFiltered();

  // Search info
  const si=document.getElementById('searchInfo');
  if(searchQuery){si.classList.add('visible');si.innerHTML=`Found <em>${filtered.length}</em> result${filtered.length!==1?'s':''} for "<em>${esc(searchQuery)}</em>"`}
  else si.classList.remove('visible');

  // ── Sidebar ──
  // Build root map from currently status+search filtered entries (so counts reflect filters)
  const baseFiltered = allEntries.filter(e=>{
    if(statusFilter!=='all' && e.match_status!==statusFilter) return false;
    if(searchQuery){
      const q=searchQuery;
      if(!(e.filename.toLowerCase().includes(q)||e.folder.toLowerCase().includes(q)||e.filepath.toLowerCase().includes(q)||(e.content_keywords_found||[]).some(k=>k.toLowerCase().includes(q)))) return false;
    }
    return true;
  });
  const rm={};
  baseFiltered.forEach(e=>{const r=e.root_folder||'(no root)';rm[r]=(rm[r]||0)+1});
  const roots=Object.keys(rm).sort();

  // Show All button state
  const allBtn=document.getElementById('allBtn');
  if(activeRoot==='all')allBtn.classList.add('active');else allBtn.classList.remove('active');

  const rl=document.getElementById('rootList');
  rl.innerHTML=roots.map(r=>`
    <div class="root-item${activeRoot===r?' active':''}" data-root="${esc(r)}">
      <div class="root-label">${esc(r||'(no root)')}</div>
      <div class="root-count">${rm[r]} file${rm[r]!==1?'s':''}
        <button class="root-copy" data-copy="${esc(r)}" title="Copy root path" onclick="event.stopPropagation()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          copy
        </button>
      </div>
    </div>`).join('');

  // Sidebar click handlers
  rl.querySelectorAll('.root-item').forEach(el=>{
    el.onclick=()=>{activeRoot=el.dataset.root;render()};
  });
  rl.querySelectorAll('.root-copy').forEach(b=>{
    b.onclick=e=>{e.stopPropagation();copyPath(b.dataset.copy,b)};
  });

  // ── Sort arrows ──
  document.querySelectorAll('.col-sort').forEach(h=>{
    const a=h.querySelector('.arrow');
    if(h.dataset.col===sortCol){h.classList.add('sorted');a.textContent=sortDir===1?' ▲':' ▼'}
    else{h.classList.remove('sorted');a.textContent=''}
  });

  // ── Table ──
  const tb=document.getElementById('tableBody');
  if(!filtered.length){
    tb.innerHTML='<div class="empty"><div class="big">🔍</div><p>No files match your filters</p></div>';
    document.getElementById('resultCount').innerHTML='';return;
  }

  let html='';
  filtered.forEach(e=>{
    const badge=e.match_status==='content_confirmed'
      ?'<span class="badge confirmed">confirmed</span>'
      :'<span class="badge filename-only">filename</span>';
    const kw=(e.content_keywords_found||[]).join(', ');
    html+=`<div class="row">
      <div class="ic">${fileIcon(e.filename)}</div>
      <div class="fname" title="${esc(e.filepath)}">${hl(e.filename)}</div>
      <div class="fpath" title="${esc(e.folder)}">${hl(e.folder)}</div>
      ${badge}
      <div class="kw" title="${esc(kw)}">${hl(kw)}</div>
      <div class="copy-cell"><button class="cbtn" data-copy="${esc(e.folder)}" title="Copy folder path">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button></div>
    </div>`;
  });
  tb.innerHTML=html;
  tb.querySelectorAll('.cbtn').forEach(b=>b.onclick=()=>copyPath(b.dataset.copy,b));
  document.getElementById('resultCount').innerHTML=`Showing <em>${filtered.length}</em> of <em>${allEntries.length}</em> files`;
}

// ── Helpers ──
function fileIcon(n){const e=n.split('.').pop().toLowerCase();return{pdf:'📕',xlsx:'📊',xls:'📊',csv:'📊',doc:'📘',docx:'📘',ppt:'📙',pptx:'📙',jpg:'🖼',png:'🖼',zip:'📦',msg:'✉️'}[e]||'📄'}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hl(t){if(!searchQuery||!t)return esc(t);return esc(t).replace(new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>')}
async function copyPath(t,b){
  try{await navigator.clipboard.writeText(t)}catch{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}
  b.classList.add('copied');showToast('Copied: '+t);setTimeout(()=>b.classList.remove('copied'),1500);
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>
</body>
</html>
